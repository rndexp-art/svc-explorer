<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>explorer · rndexp.art</title>
  <link rel="stylesheet" href="/static/css/explorer.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.160.0",
        "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- SVG layer: green outer frame, red corner anchors, the cracked-eggshell
       band of cells (#shell-layer), and the purple inner contour path. -->
  <svg id="frame-svg" xmlns="http://www.w3.org/2000/svg">
    <g id="shell-layer"></g>
    <path id="frame-contour" d="" />
    <rect id="frame-rect" x="0.5" y="0.5" />
    <circle class="frame-anchor" r="6" id="anchor-tl" />
    <circle class="frame-anchor" r="6" id="anchor-tr" />
    <circle class="frame-anchor" r="6" id="anchor-bl" />
    <circle class="frame-anchor" r="6" id="anchor-br" />
  </svg>

  <!-- In-world overlay host for the aimed polygon's translucent yellow card. -->
  <div id="polygon-overlay-host"></div>

  <!-- Functional widget hosts. These are positioned off-screen by default;
       on first render shell.js teleports each one into its anchor cell's
       <foreignObject>. The DOM lives here so panels.js can grab elements
       by id without racing the eggshell layout. -->
  <div id="hosts-staging" aria-hidden="true">
    <div id="search-panel-host" role="region" aria-label="search">
      <div class="brand">
        <span class="title">rndexp · explorer</span>
        <span class="meta">{{ me.email }}</span>
      </div>
      <input id="search-input" type="search" placeholder="search · / to focus" autocomplete="off" />
      <ul id="search-results"></ul>
      <form class="signout" action="https://auth.rndexp.art/logout" method="post">
        <input type="hidden" name="target" value="https://explorer.rndexp.art/" />
        <button type="submit" title="sign out">⤴</button>
      </form>
    </div>

    <div id="dashboard-panel-host" role="region" aria-label="dashboard"></div>

    <div id="control-panel-host" role="region" aria-label="control"></div>

    <div id="input-panel-host" role="region" aria-label="composer">
      <form id="composer" autocomplete="off">
        <textarea name="content" placeholder="add a note  ⌘/Ctrl+↵" rows="1" maxlength="65536"></textarea>
        <button type="submit">↵</button>
      </form>
    </div>
  </div>

  <!-- Per-node HUD (snaps over hovered ball). Preserved from pre-redesign. -->
  <div id="hud" aria-hidden="true">
    <div class="label"></div>
    <div class="labels"></div>
    <div class="summary"></div>
  </div>

  <div id="status">loading…</div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
